<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Wear Now</title>
    <link rel="stylesheet" href="shop.css">
    <style>
        .checkout-container {
            display: flex;
            gap: 30px;
            padding: 20px;
            max-width: 1100px;
            margin: auto;
        }
        .left, .right {
            flex: 1;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #ddd;
        }
        .left h2, .right h2 {
            margin-bottom: 15px;
            border-bottom: 2px solid #FF3D00;
            padding-bottom: 10px;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0 15px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }
        label {
            font-weight: bold;
            font-size: 14px;
        }
        .payment-option {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            cursor: pointer;
        }
        .payment-option:hover { background: #eee; }
        .order-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #ddd;
        }
        .order-item img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 5px;
        }
        #total-amount {
            font-size: 20px;
            font-weight: bold;
            margin-top: 15px;
            color: #FF3D00;
        }
        .confirm-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #FF3D00, #FF8C00, #FFD600);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            letter-spacing: 1px;
            box-shadow: 0 5px 20px rgba(255,61,0,0.4);
            transition: all 0.3s;
        }
        .confirm-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255,61,0,0.6);
        }
    </style>
</head>
<body>

<header>
    <img src="logo.png" alt="Wear Now Logo" id="logo" 
        style="height:60px; display:block; margin:auto; padding:10px;">
</header>

<nav>
    <ul style="display:flex; list-style:none; justify-content:center; gap:20px; background:#1A1A2E; padding:12px; margin:0; border-bottom: 3px solid #FF3D00;">
        <li><a href="mainpage.html" style="color:white; text-decoration:none; font-weight:600;">Home</a></li>
        <li><a href="women.html" style="color:white; text-decoration:none; font-weight:600;">Women</a></li>
        <li><a href="cart.html" style="color:white; text-decoration:none; font-weight:600;">🛒 Cart</a></li>
        <li><a href="orderhistory.html" style="color:#FFD600; text-decoration:none; font-weight:600;">📦 Orders</a></li>
    </ul>
</nav>

<h2 style="text-align:center; margin:20px; color:#1A1A2E;">Checkout 💳</h2>

<div class="checkout-container">

    <div class="left">
        <h2>📦 Delivery Address</h2>
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Enter your full name">

        <label>Phone Number</label>
        <input type="tel" id="phone" placeholder="Enter phone number">

        <label>Address</label>
        <input type="text" id="address" placeholder="House no, Street, Area">

        <label>City</label>
        <input type="text" id="city" placeholder="City">

        <label>State</label>
        <input type="text" id="state" placeholder="State">

        <label>Pincode</label>
        <input type="text" id="pincode" placeholder="Pincode">

        <h2 style="margin-top:20px;">💳 Payment Method</h2>

        <div class="payment-option">
            <input type="radio" name="payment" value="cod" id="cod" checked>
            <label for="cod">💵 Cash on Delivery</label>
        </div>

        <div class="payment-option">
            <input type="radio" name="payment" value="upi" id="upi">
            <label for="upi">📱 UPI (GPay, PhonePe, Paytm)</label>
        </div>

        <div class="payment-option">
            <input type="radio" name="payment" value="card" id="card">
            <label for="card">💳 Credit / Debit Card</label>
        </div>

        <div id="upi-input" style="display:none;">
            <label>UPI ID</label>
            <input type="text" id="upi-id" placeholder="example@upi">
        </div>

        <div id="card-input" style="display:none;">
            <label>Card Number</label>
            <input type="text" id="card-number" placeholder="XXXX XXXX XXXX XXXX">
            <label>Expiry Date</label>
            <input type="text" id="expiry" placeholder="MM/YY">
            <label>CVV</label>
            <input type="password" id="cvv" placeholder="XXX">
        </div>
    </div>

    <div class="right">
        <h2>💰 Order Summary</h2>
        <div id="order-items">Loading...</div>
        <div id="total-amount"></div>
        <button class="confirm-btn" onclick="confirmOrder()">
            ✅ Confirm Order
        </button>
    </div>

</div>

<script>
    // Payment show/hide
    document.querySelectorAll('input[name="payment"]').forEach(radio => {
        radio.addEventListener("change", function() {
            document.getElementById("upi-input").style.display = "none";
            document.getElementById("card-input").style.display = "none";
            if (this.value === "upi") {
                document.getElementById("upi-input").style.display = "block";
            } else if (this.value === "card") {
                document.getElementById("card-input").style.display = "block";
            }
        });
    });

    // Order summary load
    function loadOrderSummary() {
        const user = JSON.parse(localStorage.getItem("user"));
        if (!user) {
            alert("Please login first!");
            window.location.href = "login.html";
            return;
        }

        fetch(`http://localhost:3000/cart/${user._id}`)
        .then(res => res.json())
        .then(data => {
            let html = "";
            let total = 0;

            if (data.length === 0) {
                document.getElementById("order-items").innerHTML = 
                    "<p>Cart is empty!</p>";
                return;
            }

            data.forEach(item => {
                const price = parseFloat(item.price.replace("₹", ""));
                total += price * item.quantity;
                html += `
                    <div class="order-item">
                        <img src="${item.image}">
                        <div>
                            <p><b>Price:</b> ${item.price}</p>
                            <p><b>Qty:</b> ${item.quantity}</p>
                        </div>
                    </div>
                `;
            });

            document.getElementById("order-items").innerHTML = html;
            document.getElementById("total-amount").innerText =
                "Total: ₹" + total.toFixed(2);
        })
        .catch(err => console.error("Error:", err));
    }

    // ✅ Confirm Order — DB mein save karo
    function confirmOrder() {
        const name = document.getElementById("name").value;
        const phone = document.getElementById("phone").value;
        const address = document.getElementById("address").value;
        const city = document.getElementById("city").value;
        const state = document.getElementById("state").value;
        const pincode = document.getElementById("pincode").value;
        const payment = document.querySelector('input[name="payment"]:checked').value;
        const user = JSON.parse(localStorage.getItem("user"));

        // Validation
        if (!name || !phone || !address || !city || !state || !pincode) {
            alert("Please fill all delivery details! ❌");
            return;
        }
        if (phone.length !== 10) {
            alert("Please enter valid 10 digit phone number! ❌");
            return;
        }
        if (pincode.length !== 6) {
            alert("Please enter valid 6 digit pincode! ❌");
            return;
        }

        // Cart fetch karo
        fetch(`http://localhost:3000/cart/${user._id}`)
        .then(res => res.json())
        .then(cartItems => {
            const total = cartItems.reduce((sum, item) => {
                return sum + parseFloat(item.price.replace("₹", "")) * item.quantity;
            }, 0);

            // ✅ Order save karo DB mein
            return fetch("http://localhost:3000/save-order", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    userId: user._id,
                    items: cartItems,
                    total: "₹" + total.toFixed(2),
                    address: `${name}, ${address}, ${city}, ${state} - ${pincode}, 📞 ${phone}`,
                    payment: payment.toUpperCase()
                })
            });
        })
        .then(res => res.json())
        .then(data => {
            alert(`Order Confirmed! 🎉\n\nThank you for shopping with Wear Now! 🛍️\n\nOrder History mein dekh sakte ho!`);
            // ✅ Order history pe redirect
            window.location.href = "orderhistory.html";
        })
        .catch(err => {
            console.error(err);
            alert("Error placing order! Server chalu hai?");
        });
    }

    loadOrderSummary();
</script>

</body>
</html>
