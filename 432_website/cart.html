<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <title>Cart - Wear Now</title>
    <link rel='stylesheet' href='cart.css'>
    <style>
        .cart-item {
            display: flex;
            align-items: center;
            gap: 20px;
            border: 1px solid #ddd;
            padding: 10px;
            margin: 10px;
            border-radius: 8px;
        }
        .qty-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .qty-btn {
            width: 30px;
            height: 30px;
            font-size: 18px;
            cursor: pointer;
            border: 1px solid #333;
            border-radius: 5px;
            background: #333;
            color: white;
        }
        .qty-num {
            font-size: 16px;
            font-weight: bold;
            min-width: 20px;
            text-align: center;
        }
        .remove-btn {
            background: red;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
        }
        .checkout-btn {
            display: block;
            margin: 20px auto;
            padding: 12px 30px;
            background: #333;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        .continue-btn {
            display: block;
            margin: 10px auto;
            padding: 10px 25px;
            background: white;
            color: #333;
            border: 1px solid #333;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<header>
    <h1>My Cart 🛒</h1>
</header>

<section id="cart-container">Loading...</section>

<h2 id="total" style="text-align:center;"></h2>

<button class="checkout-btn" 
    onclick="window.location.href='checkout.html'">
    Proceed to Checkout 💳
</button>

<button class="continue-btn" 
    onclick="window.location.href='women.html'">
    ← Continue Shopping
</button>

<script>
function loadCart() {
    const user = JSON.parse(localStorage.getItem("user"));

    if (!user) {
        alert("Please login first!");
        window.location.href = "login.html";
        return;
    }

    fetch(`http://localhost:3000/cart/${user._id}`)
    .then(res => res.json())
    .then(data => {
        let html = "";
        let total = 0;

        if (data.length === 0) {
            document.getElementById("cart-container").innerHTML = 
                "<p style='text-align:center;'>Cart is empty 🛒</p>";
            document.getElementById("total").innerText = "";
            return;
        }

        data.forEach((item) => {
            const price = parseFloat(item.price.replace("₹", ""));
            total += price * item.quantity;

            html += `
                <div class="cart-item">
                    <img src="${item.image}" width="80" height="80" 
                        style="object-fit:cover; border-radius:5px;">
                    <div>
                        <p><b>Price:</b> ${item.price}</p>
                        <div class="qty-controls">
                            <button class="qty-btn" 
                                onclick="updateQty('${item._id}', ${item.quantity - 1})">−</button>
                            <span class="qty-num">${item.quantity}</span>
                            <button class="qty-btn" 
                                onclick="updateQty('${item._id}', ${item.quantity + 1})">+</button>
                        </div>
                    </div>
                    <button class="remove-btn" 
                        onclick="removeItem('${item._id}')">Remove ❌</button>
                </div>
            `;
        });

        document.getElementById("cart-container").innerHTML = html;
        document.getElementById("total").innerText = "Total: ₹" + total.toFixed(2);
    })
    .catch(err => {
        console.error("Cart Error:", err);
        document.getElementById("cart-container").innerHTML =
            "<p>Error loading cart! Server chalu hai?</p>";
    });
}

// ✅ Quantity update function
function updateQty(id, newQty) {
    // Quantity 0 se kam nahi hogi — remove ho jayega
    if (newQty < 1) {
        removeItem(id);
        return;
    }

    fetch(`http://localhost:3000/update-quantity/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ quantity: newQty })
    })
    .then(() => loadCart()); // cart reload karo
}

function removeItem(id) {
    fetch(`http://localhost:3000/remove/${id}`, {
        method: "DELETE"
    })
    .then(() => loadCart());
}

loadCart();
</script>
</body>
</html>
```

---

**Flow:**
```
− button → quantity kam hogi
+ button → quantity badegi  
quantity = 0 → item remove ho jayega ✅
